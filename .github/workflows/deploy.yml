name: Deploy to GitHub Pages

# Publica a SPA estática no GitHub Pages.
# Pré-requisito: em Settings → Pages, definir "Source" como "GitHub Actions".
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Um deploy por vez.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      # base = "/<nome-do-repo>/" para os caminhos do Pages funcionarem.
      - name: Build
        run: npm run build
        env:
          BASE_PATH: "/${{ github.event.repository.name }}/"
      # SPA: 404.html = index.html para deep-links não quebrarem.
      - run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
